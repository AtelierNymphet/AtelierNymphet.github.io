<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AtelierNymphet</title>
    <link rel="canonical" href="https://ateliernymphet.com/">
    <link rel="icon" href="data:,">
    <style>
      :root {
        color-scheme: dark;
        --ink: #fff6df;
        --muted: #d7c7a7;
        --gold: #f2c95f;
        --line: rgba(255, 246, 223, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(6, 9, 15, 0.05), rgba(6, 7, 8, 0.42) 46%, rgba(6, 7, 8, 0.96)),
          url("/assets/faery-flight.jpeg") center top / cover no-repeat,
          #07090b;
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(1180px, calc(100vw - 34px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-items: end;
        padding: clamp(34px, 6vw, 84px) 0;
      }

      .card {
        width: min(760px, 100%);
        padding: clamp(24px, 4vw, 42px);
        border: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(255, 246, 223, 0.12), transparent 38%),
          rgba(3, 7, 13, 0.72);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.44);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--gold);
        font: 700 0.78rem/1.3 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 11vw, 8.8rem);
        font-weight: 400;
        line-height: 0.82;
        letter-spacing: -0.075em;
      }

      p {
        max-width: 610px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: clamp(1.05rem, 1.8vw, 1.35rem);
        line-height: 1.45;
      }

      .enter {
        display: inline-block;
        margin-top: 30px;
        border: 1px solid rgba(242, 201, 95, 0.72);
        border-radius: 999px;
        padding: 13px 18px;
        color: var(--ink);
        font: 700 0.78rem/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.16em;
        text-decoration: none;
        text-transform: uppercase;
        background: rgba(242, 201, 95, 0.1);
      }

      .enter:hover {
        background: rgba(242, 201, 95, 0.2);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-label="AtelierNymphet entrance">
        <p class="eyebrow">Atelier Nymphet</p>
        <h1>The Works</h1>
        <p>
          A studio of novels, source ledgers, faery courts, pocket books, and private archives.
        </p>
        <a class="enter" href="/larecherche/">Enter La Recherche</a>
      </section>
    </main>
  </body>
</html>
